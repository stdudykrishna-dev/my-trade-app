<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ProTrade - Universal Terminal v3.5</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0b0e11; --sidebar: #181a20; --accent: #f0b90b; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        header { height: 60px; background: var(--sidebar); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #2b2f36; justify-content: space-between; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .tf-input { background: #2b2f36; border: 1px solid #363a45; color: var(--accent); padding: 8px; border-radius: 4px; font-weight: bold; outline: none; text-transform: uppercase; }
        .tf-select { background: #2b2f36; border: 1px solid #363a45; color: white; padding: 7px; border-radius: 4px; cursor: pointer; outline: none; }
        #price { color: #2ebd85; font-size: 22px; font-weight: bold; }
        #chart { width: 100vw; height: calc(100vh - 60px); }
        .label { font-size: 11px; color: #848e9c; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="controls">
        <span class="label">SEARCH</span>
        <input type="text" id="symbolInput" class="tf-input" placeholder="e.g. BTC" list="symbolList" style="width: 140px;">
        <datalist id="symbolList"></datalist>

        <span style="color: #363a45; margin: 0 10px;">|</span>

        <span class="label">INTERVAL</span>
        <input type="number" id="tfValue" class="tf-input" value="7" style="width: 55px;">
        <select id="tfUnit" class="tf-select">
            <option value="1">Seconds</option>
            <option value="60" selected>Minutes</option>
            <option value="3600">Hours</option>
            <option value="86400">Days</option>
        </select>
    </div>
    <div id="price">Syncing...</div>
</header>

<div id="chart"></div>

<script>
    let currentSymbol = "BTCUSDT";
    let currentCandle = null;
    let ws = null;

    // 1. Chart Initialisation
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout: { backgroundColor: '#0b0e11', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
        timeScale: { timeVisible: true, secondsVisible: true },
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#2ebd85', downColor: '#f6465d', borderVisible: false,
        wickUpColor: '#2ebd85', wickDownColor: '#f6465d'
    });

    const getIntervalSeconds = () => (parseInt(document.getElementById('tfValue').value) || 1) * parseInt(document.getElementById('tfUnit').value);

    // 2. Load Symbols for Dropdown
    function loadSymbols() {
        fetch('https://api.binance.com/api/v3/exchangeInfo')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('symbolList');
                data.symbols.filter(s => s.symbol.endsWith('USDT')).forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s.symbol;
                    list.appendChild(opt);
                });
            }).catch(e => console.error("Symbol Load Error"));
    }

    // 3. Main Data Fetching Logic
    async function fetchHistory() {
        document.getElementById('price').innerText = "Loading " + currentSymbol + "...";
        const intervalSec = getIntervalSeconds();
        let binanceInt = '1m';
        if (intervalSec >= 86400) binanceInt = '1d';
        else if (intervalSec >= 3600) binanceInt = '1h';

        try {
            const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentSymbol}&interval=${binanceInt}&limit=1000`);
            const data = await response.json();
            
            let aggregated = [];
            let temp = null;
            
            data.forEach(d => {
                const t = d[0] / 1000;
                const bucket = Math.floor(t / intervalSec) * intervalSec;
                const p = { o: parseFloat(d[1]), h: parseFloat(d[2]), l: parseFloat(d[3]), c: parseFloat(d[4]) };
                
                if (!temp || temp.time !== bucket) {
                    if (temp) aggregated.push(temp);
                    temp = { time: bucket, open: p.o, high: p.h, low: p.l, close: p.c };
                } else {
                    temp.close = p.c;
                    temp.high = Math.max(temp.high, p.h);
                    temp.low = Math.min(temp.low, p.l);
                }
            });
            if (temp) aggregated.push(temp);
            candleSeries.setData(aggregated);
            chart.timeScale().fitContent();
        } catch (error) {
            document.getElementById('price').innerText = "Symbol Error!";
        }
    }

    // 4. Live Updates
    function startLiveStream() {
        if (ws) ws.close();
        ws = new WebSocket(`wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@kline_1m`);
        
        ws.onmessage = (e) => {
            const k = JSON.parse(e.data).k;
            const t1 = k.t / 1000;
            const intervalSec = getIntervalSeconds();
            const bucket = Math.floor(t1 / intervalSec) * intervalSec;
            
            document.getElementById('price').innerText = "$" + parseFloat(k.c).toFixed(2);

            if (!currentCandle || currentCandle.time !== bucket) {
                currentCandle = { time: bucket, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c) };
            } else {
                currentCandle.close = parseFloat(k.c);
                currentCandle.high = Math.max(currentCandle.high, parseFloat(k.h));
                currentCandle.low = Math.min(currentCandle.low, parseFloat(k.l));
            }
            candleSeries.update(currentCandle);
        };
    }

    // Event Listeners
    document.getElementById('symbolInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            let val = e.target.value.toUpperCase().trim();
            if (val && !val.endsWith('USDT') && val.length < 5) val += "USDT";
            currentSymbol = val;
            fetchHistory();
            startLiveStream();
        }
    });

    document.getElementById('tfValue').addEventListener('change', () => { fetchHistory(); startLiveStream(); });
    document.getElementById('tfUnit').addEventListener('change', () => { fetchHistory(); startLiveStream(); });

    // Initial Kickstart
    loadSymbols();
    fetchHistory();
    startLiveStream();

    window.onresize = () => chart.applyOptions({ width: window.innerWidth, height: window.innerHeight - 60 });
</script>
</body>
</html>
